<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KNIGHT'S GAMBIT — Slot Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div class="app">
  <div class="header">
    <h1 class="title">Knight's Gambit</h1>
    <div class="subtitle">8 × 8  ·  L-SHAPE  ·  PIXEL ODDS</div>
  </div>

  <div class="board-wrap">
    <div class="toast" id="toast"></div>
    <div class="board" id="board"></div>
  </div>

  <div class="hud">
    <div class="stat">
      <div class="stat-label">BALANCE</div>
      <div class="stat-value" id="stat-balance">1000.00</div>
    </div>
    <div class="stat big">
      <div class="stat-label">JUMPS THIS SPIN</div>
      <div class="stat-value" id="stat-jumps">–</div>
    </div>
    <div class="stat win">
      <div class="stat-label">LAST WIN</div>
      <div class="stat-value" id="stat-win">0.00x</div>
    </div>
  </div>

  <button class="spin-btn" id="spin-btn">SPIN  · 1</button>

  <div class="footer-note">
    BET 1 PER SPIN  ·  KNIGHT JUMPS L-SHAPE  ·  RED &amp; WHITE TILES  ·  PIXEL FATE
  </div>
</div>

<!-- Plain script tags = works from file:// directly, no server needed -->
<script src="src/engine.js"></script>
<script src="src/app.js"></script>
</body>
</html>

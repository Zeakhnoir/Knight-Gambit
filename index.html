<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KNIGHT'S GAMBIT — Slot Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --board-dark: #4a0e14;       /* dark red "black" tile */
    --board-dark-2: #5a1218;
    --board-light: #f4e8d0;      /* cream "white" tile */
    --board-light-2: #ead9b3;
    --board-border: #1a0508;
    --gold: #f5c542;
    --gold-deep: #b8860b;
    --bg-0: #0d0307;
    --bg-1: #1a0a10;
    --bg-2: #2a1018;
    --accent: #ff3344;
    --text: #f4e8d0;
    --text-dim: #a89070;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, var(--bg-2), var(--bg-0) 70%);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 4px);
    pointer-events: none;
    z-index: 1;
  }
  #root { position: relative; z-index: 2; }
  .pixel { font-family: 'Press Start 2P', monospace; }
  .serif { font-family: 'DM Serif Display', serif; font-style: italic; }

  /* === LAYOUT === */
  .app {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 20px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .header {
    text-align: center;
    margin-bottom: 4px;
  }
  .title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 56px;
    line-height: 1;
    margin: 0;
    background: linear-gradient(180deg, #fff5d0 0%, var(--gold) 50%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 4px 0 rgba(0,0,0,0.4);
    letter-spacing: -1px;
  }
  .subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 3px;
  }

  /* === BOARD === */
  .board-wrap {
    position: relative;
    padding: 14px;
    background:
      linear-gradient(135deg, #2a0a10, #1a0508);
    border: 3px solid var(--gold-deep);
    border-radius: 6px;
    box-shadow:
      inset 0 0 0 1px rgba(245,197,66,0.3),
      0 0 0 2px var(--bg-0),
      0 0 40px rgba(245,197,66,0.15),
      0 16px 48px rgba(0,0,0,0.6);
  }
  .board-wrap::before {
    content: '';
    position: absolute; inset: 14px;
    background: var(--board-border);
    border-radius: 2px;
    z-index: 0;
  }
  .board {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(8, 64px);
    grid-template-rows: repeat(8, 64px);
    gap: 0;
    border: 2px solid var(--board-border);
  }
  .tile {
    position: relative;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    user-select: none;
  }
  .tile.dark {
    background:
      linear-gradient(135deg, var(--board-dark-2) 0%, var(--board-dark) 100%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), inset 1px 1px 0 rgba(255,255,255,0.04);
  }
  .tile.light {
    background:
      linear-gradient(135deg, var(--board-light) 0%, var(--board-light-2) 100%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2), inset 1px 1px 0 rgba(255,255,255,0.5);
  }
  .tile-content {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    line-height: 1.1;
    text-align: center;
    z-index: 2;
    pointer-events: none;
  }
  .tile.dark .tile-content { color: #ffe9a8; }
  .tile.light .tile-content { color: #4a0e14; }
  .tile-content .mult { display: block; }
  .tile-content .x { font-size: 8px; opacity: 0.7; }

  .tile.empty .tile-content { opacity: 0.25; font-size: 16px; }
  .tile.payout-low .tile-content { color: var(--accent); }
  .tile.dark.payout-low .tile-content { color: #ff6b7a; }
  .tile.payout-high .tile-content {
    color: var(--gold);
    text-shadow: 0 0 4px rgba(245,197,66,0.6);
    animation: shimmer 1.6s ease-in-out infinite;
  }
  .tile.dark.payout-high .tile-content { color: #ffd84d; }
  .tile.jumps .tile-content { color: #6ec1ff; }
  .tile.dark.jumps .tile-content { color: #9ad6ff; }
  .tile.horse .tile-content { color: #ff85d8; }

  @keyframes shimmer {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
  }

  /* Landing flash */
  .tile.flash::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(255,255,200,0.9), transparent 70%);
    animation: flashFade 0.6s ease-out forwards;
    z-index: 3;
    pointer-events: none;
  }
  @keyframes flashFade {
    0% { opacity: 1; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* === KNIGHT SPRITE === */
  .knight {
    position: absolute;
    top: 0; left: 0;
    width: 64px; height: 64px;
    pointer-events: none;
    z-index: 10;
    transition: transform 0.3s cubic-bezier(0.5, -0.4, 0.5, 1.4);
    will-change: transform;
  }
  .knight.gold { filter: drop-shadow(0 0 6px rgba(245,197,66,0.8)); }
  .knight svg { width: 100%; height: 100%; }

  /* === HUD === */
  .hud {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 580px;
  }
  .stat {
    flex: 1;
    min-width: 110px;
    background: linear-gradient(180deg, #1a0a10, #0d0307);
    border: 2px solid var(--gold-deep);
    padding: 10px 14px;
    text-align: center;
    box-shadow: inset 0 0 0 1px rgba(245,197,66,0.15);
  }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--gold);
  }
  .stat.big .stat-value {
    font-size: 22px;
    color: #fff5d0;
    text-shadow: 0 0 10px rgba(245,197,66,0.6);
  }
  .stat.win .stat-value { color: #6ec1ff; }
  .stat.win.flashing .stat-value { animation: winFlash 0.4s ease 6; }
  @keyframes winFlash {
    0%, 100% { color: #6ec1ff; }
    50% { color: var(--gold); text-shadow: 0 0 20px var(--gold); }
  }

  /* === SPIN BUTTON === */
  .spin-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    padding: 18px 48px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: #2a0a10;
    border: 3px solid #2a0a10;
    box-shadow:
      0 4px 0 #2a0a10,
      inset 0 2px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.2);
    cursor: pointer;
    letter-spacing: 4px;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
  }
  .spin-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow:
      0 5px 0 #2a0a10,
      inset 0 2px 0 rgba(255,255,255,0.5),
      inset 0 -2px 0 rgba(0,0,0,0.2);
  }
  .spin-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow:
      0 1px 0 #2a0a10,
      inset 0 2px 0 rgba(255,255,255,0.3);
  }
  .spin-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }

  /* === LOG / EVENT TOAST === */
  .toast {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%) translateY(-12px);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    background: rgba(13,3,7,0.92);
    border: 2px solid var(--gold);
    padding: 8px 14px;
    color: var(--gold);
    z-index: 20;
    letter-spacing: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.3s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* === Roll-N badge === */
  .jumps-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(13,3,7,0.85);
    border: 2px solid #6ec1ff;
    padding: 6px 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #9ad6ff;
    letter-spacing: 2px;
  }

  .footer-note {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* mobile */
  @media (max-width: 600px) {
    .board { grid-template-columns: repeat(8, 38px); grid-template-rows: repeat(8, 38px); }
    .tile, .knight { width: 38px; height: 38px; }
    .tile-content { font-size: 8px; }
    .tile.empty .tile-content { font-size: 11px; }
    .title { font-size: 34px; }
    .spin-btn { font-size: 14px; padding: 14px 28px; letter-spacing: 2px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useRef, useEffect, useCallback, useMemo } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import { spin as localSpin, BOARD_SIZE, START_R, START_C, EXTRA_HORSE_START_R, EXTRA_HORSE_START_C } from './engine.js';
import { KNIGHT_SPRITE, KNIGHT_PALETTE_LIGHT, KNIGHT_PALETTE_GOLD, spriteToSVG } from './sprites.js';

// Try the backend first; fall back to local engine if unreachable.
// In production you'd ALWAYS use the server result (player can't be trusted with RNG).
async function getSpinResult() {
  try {
    const res = await fetch('/api/spin', { method: 'POST' });
    if (!res.ok) throw new Error('bad status');
    return await res.json();
  } catch (e) {
    console.warn('[knight-slot] /api/spin unavailable, using local engine for demo.');
    return localSpin();
  }
}

const h = React.createElement;

// === Tile rendering ===
function tileLabel(tile) {
  if (tile.kind === 'EMPTY') return { text: '·', cls: 'empty' };
  if (tile.kind === 'PAYOUT') {
    const isHigh = tile.mult >= 5;
    const cls = isHigh ? 'payout-high' : 'payout-low';
    const text = h('span', null,
      h('span', { className: 'mult' }, tile.mult),
      h('span', { className: 'x' }, 'x')
    );
    return { text, cls };
  }
  if (tile.kind === 'JUMPS') {
    return { text: h('span', null, '+', tile.jumps, h('span', { className: 'x' }, ' JMP')), cls: 'jumps' };
  }
  if (tile.kind === 'HORSE') {
    return { text: '♞+', cls: 'horse' };
  }
  return { text: '?', cls: '' };
}

function Tile({ r, c, tile, flashing }) {
  const isDark = (r + c) % 2 === 1;
  const { text, cls } = tileLabel(tile);
  return h('div', {
    className: `tile ${isDark ? 'dark' : 'light'} ${cls} ${flashing ? 'flash' : ''}`,
    'data-r': r, 'data-c': c
  }, h('div', { className: 'tile-content' }, text));
}

// Pixel art knight rendered as inline SVG
function Knight({ r, c, gold, tileSize, visible }) {
  const svgString = useMemo(
    () => spriteToSVG(KNIGHT_SPRITE, gold ? KNIGHT_PALETTE_GOLD : KNIGHT_PALETTE_LIGHT, tileSize),
    [gold, tileSize]
  );
  const style = {
    transform: `translate(${c * tileSize}px, ${r * tileSize}px)`,
    width: tileSize,
    height: tileSize,
    opacity: visible ? 1 : 0
  };
  return h('div', {
    className: `knight ${gold ? 'gold' : ''}`,
    style,
    dangerouslySetInnerHTML: { __html: svgString }
  });
}

// === Main App ===
function App() {
  const [board, setBoard] = useState(() => initialBoard());
  const [primaryPos, setPrimaryPos] = useState({ r: START_R, c: START_C });
  const [extraHorses, setExtraHorses] = useState([]); // {id, r, c}
  const [balance, setBalance] = useState(1000);
  const [lastWin, setLastWin] = useState(0);
  const [totalWon, setTotalWon] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [baseN, setBaseN] = useState(null);
  const [flashTile, setFlashTile] = useState(null); // "r-c"
  const [toast, setToast] = useState(null);
  const [tileSize, setTileSize] = useState(64);

  useEffect(() => {
    const onResize = () => setTileSize(window.innerWidth <= 600 ? 38 : 64);
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Build a fresh hidden board for the initial render
  function initialBoard() {
    const b = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      const row = [];
      for (let c = 0; c < BOARD_SIZE; c++) row.push({ kind: 'EMPTY' });
      b.push(row);
    }
    return b;
  }

  const showToast = useCallback((msg, ms = 1200) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  }, []);

  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));

  const handleSpin = useCallback(async () => {
    if (spinning) return;
    if (balance < 1) {
      showToast('OUT OF COINS!');
      return;
    }
    setSpinning(true);
    setBalance((b) => b - 1);
    setLastWin(0);

    // Get spin result from backend (or local fallback)
    const result = await getSpinResult();
    setBaseN(result.baseN);
    setBoard(result.board);
    setPrimaryPos({ r: START_R, c: START_C });
    setExtraHorses([]);
    showToast(`${result.baseN} JUMPS!`, 900);

    await sleep(700);

    let runningWin = 0;

    // Animate each horse in sequence
    for (let hi = 0; hi < result.horses.length; hi++) {
      const horse = result.horses[hi];
      const isPrimary = horse.origin === 'PRIMARY';
      const horseId = `h-${hi}`;

      if (!isPrimary) {
        // Spawn extra horse at top-left
        setExtraHorses((arr) => [...arr, { id: horseId, r: horse.startR, c: horse.startC }]);
        showToast('EXTRA HORSE!', 800);
        await sleep(600);
      }

      for (const step of horse.path) {
        if (isPrimary) {
          setPrimaryPos({ r: step.r, c: step.c });
        } else {
          setExtraHorses((arr) => arr.map((eh) => eh.id === horseId ? { ...eh, r: step.r, c: step.c } : eh));
        }
        await sleep(310);

        // Flash on landing
        setFlashTile(`${step.r}-${step.c}`);
        setTimeout(() => setFlashTile(null), 500);

        if (step.payout > 0) {
          runningWin += step.payout;
          setLastWin(runningWin);
          showToast(`+${step.payout}x`, 700);
        } else if (step.gainedJumps > 0) {
          showToast(`+${step.gainedJumps} JUMPS`, 700);
        } else if (step.triggeredHorse) {
          showToast('HORSE TRIGGER!', 800);
        }

        await sleep(40);
      }
    }

    // Final settlement
    setBalance((b) => b + result.totalWin);
    setTotalWon((t) => t + result.totalWin);
    setLastWin(result.totalWin);
    if (result.totalWin > 0) {
      showToast(`WIN ${result.totalWin}x`, 1500);
    }
    setSpinning(false);
  }, [spinning, balance, showToast]);

  const tiles = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      tiles.push(h(Tile, {
        key: `${r}-${c}`,
        r, c,
        tile: board[r][c],
        flashing: flashTile === `${r}-${c}`
      }));
    }
  }

  return h('div', { className: 'app' },
    h('div', { className: 'header' },
      h('h1', { className: 'title' }, "Knight's Gambit"),
      h('div', { className: 'subtitle' }, '8 × 8  ·  L-SHAPE  ·  PIXEL ODDS')
    ),

    // Board
    h('div', { className: 'board-wrap' },
      toast && h('div', { className: 'toast show' }, toast),
      h('div', { className: 'board', style: {
        gridTemplateColumns: `repeat(8, ${tileSize}px)`,
        gridTemplateRows: `repeat(8, ${tileSize}px)`
      }},
        ...tiles,
        // Primary horse (positioned absolutely inside the grid)
        h(Knight, {
          r: primaryPos.r, c: primaryPos.c,
          gold: false, tileSize, visible: true
        }),
        // Extra horses
        ...extraHorses.map((eh) =>
          h(Knight, { key: eh.id, r: eh.r, c: eh.c, gold: true, tileSize, visible: true })
        )
      )
    ),

    // HUD
    h('div', { className: 'hud' },
      h('div', { className: 'stat' },
        h('div', { className: 'stat-label' }, 'BALANCE'),
        h('div', { className: 'stat-value' }, balance.toFixed(2))
      ),
      h('div', { className: 'stat big' },
        h('div', { className: 'stat-label' }, 'JUMPS THIS SPIN'),
        h('div', { className: 'stat-value' }, baseN ?? '–')
      ),
      h('div', { className: `stat win ${lastWin > 0 ? 'flashing' : ''}` },
        h('div', { className: 'stat-label' }, 'LAST WIN'),
        h('div', { className: 'stat-value' }, lastWin.toFixed(2) + 'x')
      )
    ),

    // Spin button
    h('button', {
      className: 'spin-btn',
      onClick: handleSpin,
      disabled: spinning
    }, spinning ? 'JUMPING…' : 'SPIN  · 1'),

    h('div', { className: 'footer-note' },
      'BET 1 PER SPIN  ·  KNIGHT JUMPS L-SHAPE  ·  RED & WHITE TILES  ·  PIXEL FATE'
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
